<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️ Proposal</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family: 'Arial', sans-serif;
}

body{
 height:100vh;
 background: radial-gradient(circle at top, #111, #000);
 color:white;
 overflow-x:hidden;
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
}

h1{
 font-size:3rem;
 color:#ff4d6d;
 text-shadow:0 0 20px #ff4d6d;
}

p{
 color:#fff;
 opacity:0.8;
 margin-top:10px;
}

/* ENVELOPE */
.envelope-container{
 margin-top:40px;
 perspective:1000px;
}

.envelope{
 width:220px;
 height:140px;
 background:#111;
 border:2px solid #ff4d6d;
 position:relative;
 cursor:pointer;
 transform-style:preserve-3d;
 transition:0.8s;
}

.envelope:before{
 content:'';
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:linear-gradient(45deg,#ff4d6d,#ff99aa);
 clip-path: polygon(0 0, 100% 0, 50% 50%);
 transform-origin:top;
 transition:0.8s;
}

.envelope.open:before{
 transform:rotateX(180deg);
}

.card{
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:white;
 color:black;
 padding:15px;
 transform:translateY(120%);
 transition:0.8s;
}

.envelope.open .card{
 transform:translateY(0);
}

.card h2{
 color:#ff4d6d;
}

/* BUTTONS */
.btns{
 margin-top:10px;
 display:flex;
 justify-content:space-between;
}

button{
 padding:8px 15px;
 border:none;
 cursor:pointer;
 font-weight:bold;
}

.yes{
 background:#ff4d6d;
 color:white;
}

.no{
 background:black;
 color:white;
}

/* 3D CARDS */
.section{
 padding:60px 20px;
 text-align:center;
}

.cards{
 display:flex;
 justify-content:center;
 gap:20px;
 flex-wrap:wrap;
}

.card3d{
 width:180px;
 height:220px;
 perspective:1000px;
}

.inner{
 width:100%;
 height:100%;
 transition:transform 0.8s;
 transform-style:preserve-3d;
 position:relative;
 cursor:pointer;
}

.card3d:hover .inner{
 transform:rotateY(180deg);
}

.front, .back{
 position:absolute;
 width:100%;
 height:100%;
 backface-visibility:hidden;
 display:flex;
 justify-content:center;
 align-items:center;
 border-radius:10px;
}

.front{
 background:#ff4d6d;
}

.back{
 background:#111;
 color:white;
 transform:rotateY(180deg);
 border:1px solid white;
}

/* bouquet */
.bouquet{
 font-size:60px;
 animation: float 3s infinite ease-in-out;
}

@keyframes float{
 0%{transform:translateY(0);}
 50%{transform:translateY(-20px);}
 100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
  <h1>Happy Birthday ❤️</h1>
  <p>A special surprise is waiting for you...</p>

  <div class="envelope-container">
    <div class="envelope" onclick="openEnvelope()">
      <div class="card">
        <h2>Will You Marry Me? ❤️</h2>
        <p>You are my today and all my tomorrows...</p>

        <div class="btns">
          <button class="yes" onclick="sendResponse('YES')">YES</button>
          <button class="no" onclick="sendResponse('NO')">NO</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h2 style="color:#ff4d6d;">Tap the Cards 💖</h2>
  <div class="cards">

    <div class="card3d">
      <div class="inner">
        <div class="front">❤️ Love</div>
        <div class="back">You are my heartbeat</div>
      </div>
    </div>

    <div class="card3d">
      <div class="inner">
        <div class="front">💗 Care</div>
        <div class="back">I will always protect you</div>
      </div>
    </div>

    <div class="card3d">
      <div class="inner">
        <div class="front">🌹 Forever</div>
        <div class="back">Only you and me</div>
      </div>
    </div>

  </div>

  <div class="bouquet">💐</div>
</div>

<script>
function openEnvelope(){
 document.querySelector('.envelope').classList.toggle('open');
}

/* FORM CONNECTION (FORMSPREE) */
function sendResponse(answer){
  
  fetch("https://formspree.io/f/YOUR_FORM_ID", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "Proposal Answer: " + answer
    })
  });

  alert("Your response has been sent ❤️");
}
</script>

</body>
</html>
